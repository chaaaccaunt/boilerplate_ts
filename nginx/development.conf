worker_processes 1;

events {
  worker_connections 1024;
}

http {
  map $http_origin $is_allowed_origin {
    default 0;
    "" 1;
    "http://localhost" 1;
    "http://localhost:8080" 1;
    "http://test.gtrktuva.local" 1;
    "https://node-dev.ru" 1;
  }

  map $request_method $is_state_changing_method {
    default 0;
    POST 1;
    PATCH 1;
    DELETE 1;
  }

  map "$is_state_changing_method:$is_allowed_origin" $is_forbidden_origin {
    default 0;
    "1:0" 1;
  }

  map "$request_method:$is_allowed_origin" $is_forbidden_preflight {
    default 0;
    "OPTIONS:0" 1;
  }

  map $http_upgrade $connection_upgrade {
    default upgrade;
    "" close;
  }

  upstream boilerplate_frontend_dev {
    server 127.0.0.1:8080;
  }

  upstream boilerplate_gateway_public {
    server 127.0.0.1:4200;
  }

  upstream boilerplate_gateway_authorization {
    server 127.0.0.1:4201;
  }

  upstream boilerplate_gateway_files {
    server 127.0.0.1:4202;
  }

  upstream boilerplate_gateway_chat_realtime {
    server 127.0.0.1:4203;
  }

  include conf.d/development.frontend.conf;
  include conf.d/development.api.conf;
}
