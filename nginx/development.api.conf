map $http_origin $is_allowed_origin {
  default 0;
  "https://node-dev.ru" 1;
}

map $request_method $is_state_changing_method {
  default 0;
  POST 1;
  PATCH 1;
  DELETE 1;
}

map "$is_state_changing_method:$is_allowed_origin" $is_forbidden_origin {
  default 0;
  "1:0" 1;
}

map "$request_method:$is_allowed_origin" $is_forbidden_preflight {
  default 0;
  "OPTIONS:0" 1;
}

map $http_upgrade $connection_upgrade {
  default upgrade;
  "" close;
}

upstream boilerplate_gateway_public {
  server 192.168.1.100:4200;
}

upstream boilerplate_gateway_authorization {
  server 192.168.1.100:4201;
}

upstream boilerplate_gateway_files {
  server 192.168.1.100:4202;
}

upstream boilerplate_gateway_chat_realtime {
  server 192.168.1.100:4203;
}

server {
  listen 80;
  server_name api.node-dev.ru;

  access_log off;

  location /v1/gateway/authorization/ {
    if ($is_forbidden_preflight) {
      return 403;
    }

    if ($request_method = OPTIONS) {
      add_header Access-Control-Allow-Origin $http_origin always;
      add_header Access-Control-Allow-Credentials "true" always;
      add_header Access-Control-Allow-Methods "GET, POST, PATCH, DELETE, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
      add_header Vary "Origin" always;
      return 204;
    }

    if ($is_forbidden_origin) {
      return 403;
    }

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://boilerplate_gateway_authorization;
  }

  location /v1/gateway/files/ {
    if ($is_forbidden_preflight) {
      return 403;
    }

    if ($request_method = OPTIONS) {
      add_header Access-Control-Allow-Origin $http_origin always;
      add_header Access-Control-Allow-Credentials "true" always;
      add_header Access-Control-Allow-Methods "GET, POST, PATCH, DELETE, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
      add_header Vary "Origin" always;
      return 204;
    }

    if ($is_forbidden_origin) {
      return 403;
    }

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://boilerplate_gateway_files;
  }

  location /v1/gateway/ {
    if ($is_forbidden_preflight) {
      return 403;
    }

    if ($request_method = OPTIONS) {
      add_header Access-Control-Allow-Origin $http_origin always;
      add_header Access-Control-Allow-Credentials "true" always;
      add_header Access-Control-Allow-Methods "GET, POST, PATCH, DELETE, OPTIONS" always;
      add_header Access-Control-Allow-Headers "Content-Type, Authorization, X-Requested-With" always;
      add_header Vary "Origin" always;
      return 204;
    }

    if ($is_forbidden_origin) {
      return 403;
    }

    proxy_http_version 1.1;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://boilerplate_gateway_public;
  }

  location /v1/connection {
    if ($is_allowed_origin = 0) {
      return 403;
    }

    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection $connection_upgrade;
    proxy_set_header Host $host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_pass http://boilerplate_gateway_chat_realtime;
  }
}
